<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>
Visitantes
</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="css/style.css">

</head>

<body>

<div class="container-fluid">

<div class="row">

<div class="col-md-2 sidebar">

<h4 class="text-white mt-3">
Registro Visitas
</h4>

<hr class="text-white">

<a id="menuDashboard" href="dashboard.html">
Dashboard
</a>

<a id="menuGuardia" href="guardia.html">
Guardia
</a>

<a id="menuReportes" href="reportes.html">
Reportes
</a>

<a id="menuUnidades" href="unidades.html">
Unidades
</a>

<a id="menuUsuarios" href="usuarios.html">
Usuarios
</a>

<a id="menuEventos" href="eventos.html">
Eventos
</a>

<a id="menuVisitantes" href="visitantes.html">
Visitantes
</a>

<a id="menuInvitaciones" href="invitaciones.html">
Invitaciones
</a>

<a href="#"
onclick="cerrarSesion(); return false;">
Cerrar Sesión
</a>

</div>

<div class="col-md-10 content">

<h2>
Visitantes
</h2>

<div class="card">

<div class="card-body">

<div class="row">

<div class="col-md-4">

<input
id="nombre"
class="form-control"
placeholder="Nombre completo">

</div>

<div class="col-md-2">

<select
id="tipoDocumento"
class="form-select">

<option value="RUT">
RUT
</option>

<option value="PASAPORTE">
PASAPORTE
</option>

</select>

</div>

<div class="col-md-3">

<input
id="documento"
class="form-control"
placeholder="RUT o Pasaporte">

</div>

<div class="col-md-3">

<input
id="correo"
class="form-control"
placeholder="Correo">

</div>

</div>

<br>

<div class="row">

<div class="col-md-4">

<input
id="telefono"
class="form-control"
placeholder="Teléfono">

</div>

<div class="col-md-4">

<button
id="btnGuardar"
class="btn btn-primary">

Guardar

</button>

</div>

</div>

</div>

</div>

<br>

<table
class="table table-bordered">

<thead>

<tr>

<th>ID</th>
<th>Nombre</th>
<th>Tipo</th>
<th>Documento</th>
<th>Correo</th>
<th>Teléfono</th>


</tr>

</thead>

<tbody
id="tablaVisitantes">

</tbody>

</table>

</div>

</div>

</div>

<script src="js/visitantes.js"></script>
<script src="js/seguridad.js"></script>
<script src="js/menu.js"></script>
</body>

</html>
