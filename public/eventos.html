<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>
Eventos
</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="css/style.css">

</head>

<body>

<div class="container-fluid">

<div class="row">
<div class="col-md-2 sidebar">

<h4 class="text-white mt-3">
Registro Visitas
</h4>

<hr class="text-white">

<a id="menuDashboard" href="dashboard.html">
Dashboard
</a>

<a id="menuGuardia" href="guardia.html">
Guardia
</a>

<a id="menuReportes" href="reportes.html">
Reportes
</a>

<a id="menuUnidades" href="unidades.html">
Unidades
</a>

<a id="menuUsuarios" href="usuarios.html">
Usuarios
</a>

<a id="menuEventos" href="eventos.html">
Eventos
</a>

<a id="menuVisitantes" href="visitantes.html">
Visitantes
</a>

<a id="menuInvitaciones" href="invitaciones.html">
Invitaciones
</a>

<a href="#"
onclick="cerrarSesion(); return false;">
Cerrar Sesión
</a>

</div>

    <!-- CONTENIDO -->
    <div class="col-md-10 content">

        <h2>
        Eventos
        </h2>

        <div class="card">

            <div class="card-body">

                <div class="row">

                    <div class="col-md-6">

                        <input
                        id="descripcion"
                        class="form-control"
                        placeholder="Descripción">

                    </div>

                    <div class="col-md-3">

                        <input
                        type="date"
                        id="fecha"
                        class="form-control">

                    </div>

                    <div class="col-md-3">

                        <input
                        id="lugar"
                        class="form-control"
                        placeholder="Lugar">

                    </div>

                </div>

                <br>

                <div class="row">

                    <div class="col-md-3">

                        <input
                        type="time"
                        id="horaInicio"
                        class="form-control">

                    </div>

                    <div class="col-md-3">

                        <input
                        type="time"
                        id="horaFin"
                        class="form-control">

                    </div>

                    <div class="col-md-3">

                        <select
                        id="unidad"
                        class="form-select">

                        </select>

                    </div>

                    <div class="col-md-3">

                        <select
                        id="anfitrion"
                        class="form-select">

                        </select>

                        <br>

                        <label>
                        Anfitriones Secundarios
                        </label>

                        <div
                        id="listaAnfitriones"
                        class="border p-3">

                        </div>

                    </div>

                </div>

                <br>

                <button
                id="btnGuardar"
                class="btn btn-primary">

                Guardar Evento

                </button>

            </div>

        </div>

        <br>

        <table
        class="table table-bordered">

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Descripción</th>
                    <th>Fecha</th>
                    <th>Inicio</th>
                    <th>Fin</th>
                    <th>Unidad</th>
                    <th>Principal</th>
                    <th>Secundarios</th>
<th>Acciones</th>
                </tr>

            </thead>

            <tbody
            id="tablaEventos">

            </tbody>

        </table>

    </div>

</div>

</div>

<script src="js/eventos.js"></script>
<script src="js/seguridad.js"></script>
<script src="js/menu.js"></script>

</body>

</html>
